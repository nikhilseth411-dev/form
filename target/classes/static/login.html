<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Union Bank Login</title>

<style>
body {
	background: #050816;
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
	margin: 0;
	font-family: Arial;
}

.card {
	width: 350px;
	background: #111827;
	padding: 40px;
	border-radius: 20px;
}

h1 {
	color: #d6b37c;
	text-align: center;
}

input {
	width: 100%;
	padding: 14px;
	margin-top: 15px;
	border: none;
	border-radius: 10px;
	box-sizing: border-box;
}

button {
	width: 100%;
	padding: 14px;
	margin-top: 20px;
	border: none;
	border-radius: 10px;
	background: #d6b37c;
	cursor: pointer;
	font-weight: bold;
}

button:hover {
	opacity: .9;
}

#err {
	color: red;
	text-align: center;
	margin-top: 15px;
}
</style>

</head>

<body>

	<div class="card">

		<h1>Login</h1>

		<input id="email" type="email" placeholder="Enter Email"> <input
			id="password" type="password" placeholder="Enter Password">

		<button onclick="login()">Login</button>

		<p id="err"></p>

	</div>

	<script>

localStorage.removeItem("loggedIn");

async function login() {

    const email =
        document
        .getElementById("email")
        .value
        .trim();

    const password =
        document
        .getElementById("password")
        .value
        .trim();

    const err =
        document
        .getElementById("err");

    err.innerHTML = "";

    if(email === "" || password === ""){
        err.innerHTML =
            "Enter email and password";
        return;
    }

    try {

        const response =
            await fetch(
                "/login",
                {
                    method:"POST",

                    headers:{
                        "Content-Type":
                        "application/json"
                    },

                    body:JSON.stringify({
                        email:email,
                        password:password
                    })
                }
            );

        const message =
            await response.text();

        if(response.ok){

            localStorage.setItem(
                "loggedIn",
                "true"
            );

            window.location.href =
                "/index.html";

        } else {

            err.innerHTML =
                message;

        }

    }

    catch(e){

        err.innerHTML =
            "Server Error";

    }

}

</script>

</body>

</html>
