<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
background:#050816;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.card{

width:350px;

background:#111827;

padding:40px;

border-radius:20px;

}

h1{
color:#d6b37c;
}

input{

width:100%;

padding:14px;

margin-top:15px;

border-radius:10px;

border:none;

}

button{

width:100%;

padding:14px;

margin-top:20px;

background:#d6b37c;

border:none;

cursor:pointer;

}

p{
color:red;
}

</style>

</head>

<body>

<div class="card">

<h1>Login</h1>

<input
id="username"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="login()">

Login

</button>

<p id="err"></p>

</div>


<script>

async function login(){

let username =
document
.getElementById(
"username"
)
.value;

let password =
document
.getElementById(
"password"
)
.value;


let response =
await fetch(
"http://localhost:8080/login",

{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

username:
username,

password:
password

})

}

);


if(response.ok){

window.location.href=
"index.html";

}

else{

document
.getElementById(
"err"
)
.innerHTML=
"Invalid Credentials";

}

}

</script>

</body>

</html>
