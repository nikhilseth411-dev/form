<!DOCTYPE html>
<html>
<head>
    <title>Customer Form</title>
</head>
<body>

    <h1>Customer Form</h1>

    <form id="customerForm">

        PAN Number:
        <input type="text" id="panNumber"><br><br>

        Customer Name:
        <input type="text" id="customerName"><br><br>

        Age:
        <input type="number" id="age"><br><br>

        Yearly Income:
        <input type="number" id="yearlyIncome"><br><br>

        Interest Income:
        <input type="number" id="interestIncome"><br><br>

        Regime:
        <input type="text" id="regime"><br><br>

        <button type="submit">Save Customer</button>

    </form>

    <script>

        document.getElementById("customerForm").addEventListener("submit", function(event) {

            event.preventDefault();

            const customer = {

                panNumber: document.getElementById("panNumber").value,
                customerName: document.getElementById("customerName").value,
                age: document.getElementById("age").value,
                yearlyIncome: document.getElementById("yearlyIncome").value,
                interestIncome: document.getElementById("interestIncome").value,
                regime: document.getElementById("regime").value
            };

            fetch("http://localhost:8080/save", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify(customer)

            })
            .then(response => response.json())
            .then(data => {

                alert("Customer Saved Successfully");

                console.log(data);
            })
            .catch(error => {

                console.error(error);
            });
        });

    </script>
</body>
</html>
