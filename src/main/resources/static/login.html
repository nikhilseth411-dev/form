<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Union Bank Login</title>

<style>
body {
	background: #050816;
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
	font-family: Arial;
	margin: 0;
}

.card {
	width: 350px;
	background: #111827;
	padding: 40px;
	border-radius: 20px;
}

h1 {
	color: #d6b37c;
	text-align: center;
}

input {
	width: 100%;
	padding: 14px;
	margin-top: 15px;
	border-radius: 10px;
	border: none;
	box-sizing: border-box;
}

button {
	width: 100%;
	padding: 14px;
	margin-top: 20px;
	background: #d6b37c;
	border: none;
	cursor: pointer;
	border-radius: 10px;
	font-weight: bold;
}

p {
	color: red;
	text-align: center;
}
</style>

</head>

<body>

	<div class="card">

		<h1>Login</h1>

		<input id="email" type="email" placeholder="Enter Email"> <input
			id="password" type="password" placeholder="Enter Password">

		<button onclick="login()">Login</button>

		<p id="err"></p>

	</div>

	<script>
		localStorage.removeItem("loggedIn");

		async function login() {

			const email = document.getElementById("email").value.trim();

			const password = document.getElementById("password").value.trim();

			const err = document.getElementById("err");

			err.innerHTML = "";

			try {

				const response =

				await
				fetch(

				"/login",

				{

					method : "POST",

					headers : {

						"Content-Type" : "application/json"

					},

					body :

					JSON.stringify({

						email : email,

						password : password

					})

				}

				);

				if (response.ok) {

					localStorage.setItem(

					"loggedIn",

					"true"

					);

					window.location.href =

					"/index.html";

				}

				else {

					err.innerHTML =

					"Invalid Credentials";

				}

			}

			catch (e) {

				err.innerHTML =

				"Login Failed";

			}

		}
	</script>

</body>

</html>
